{% extends "base.html" %}

{% block content %}
<div class="page-section active" style="max-width: 800px; margin: 0 auto;">
    <div class="vault-header" style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
        <h1 style="font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em;">
            <span class="highlight">Report Incident</span>
        </h1>
        <p style="color: var(--text-secondary); margin-top: 0.2rem;">
            Provide details about the cyber incident
        </p>
    </div>

    <div class="chain-viz" style="padding: 2rem;">
        <form method="post" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <!-- Title -->
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-primary); font-size: 0.9rem;">
                    <i class="fas fa-heading" style="color: var(--accent-teal-light); margin-right: 0.4rem;"></i> Title
                </label>
                <input type="text" name="title" placeholder="e.g., Phishing Attack" required
                       style="width: 100%; padding: 0.8rem 1rem; background: var(--bg-card); border: 1px solid rgba(42,107,111,0.08); border-radius: 1.2rem; color: var(--text-primary); font-size: 0.95rem; transition: 0.3s; outline: none; font-family: inherit;">
            </div>

            <!-- Description -->
            <div>
                <label style="display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-primary); font-size: 0.9rem;">
                    <i class="fas fa-align-left" style="color: var(--accent-teal-light); margin-right: 0.4rem;"></i> Description
                </label>
                <textarea name="description" rows="5" placeholder="Describe the incident in detail..." required
                          style="width: 100%; padding: 0.8rem 1rem; background: var(--bg-card); border: 1px solid rgba(42,107,111,0.08); border-radius: 1.2rem; color: var(--text-primary); font-size: 0.95rem; transition: 0.3s; outline: none; font-family: inherit; resize: vertical;"></textarea>
            </div>

            <!-- Category & Severity (2 columns) -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem;">
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-primary); font-size: 0.9rem;">
                        <i class="fas fa-tag" style="color: var(--accent-teal-light); margin-right: 0.4rem;"></i> Category
                    </label>
                    <select name="category" required
                            style="width: 100%; padding: 0.8rem 1rem; background: var(--bg-card); border: 1px solid rgba(42,107,111,0.08); border-radius: 1.2rem; color: var(--text-primary); font-size: 0.95rem; transition: 0.3s; outline: none; font-family: inherit; appearance: none;">
                        <option value="Phishing">Phishing</option>
                        <option value="Malware">Malware</option>
                        <option value="Fraud">Fraud</option>
                        <option value="Identity Theft">Identity Theft</option>
                        <option value="Ransomware">Ransomware</option>
                        <option value="Data Breach">Data Breach</option>
                        <option value="Cyberstalking">Cyberstalking</option>
                        <option value="Insider Attack">Insider Attack</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-primary); font-size: 0.9rem;">
                        <i class="fas fa-exclamation-triangle" style="color: var(--accent-gold); margin-right: 0.4rem;"></i> Severity
                    </label>
                    <select name="severity" required
                            style="width: 100%; padding: 0.8rem 1rem; background: var(--bg-card); border: 1px solid rgba(42,107,111,0.08); border-radius: 1.2rem; color: var(--text-primary); font-size: 0.95rem; transition: 0.3s; outline: none; font-family: inherit; appearance: none;">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="padding: 0.9rem; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem;">
                <i class="fas fa-paper-plane"></i> Submit Incident
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <a href="{{ url_for('victim.dashboard') }}" class="btn btn-outline" style="padding: 0.5rem 2rem; font-size: 0.9rem;">
                <i class="fas fa-arrow-left" style="margin-right: 0.4rem;"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
