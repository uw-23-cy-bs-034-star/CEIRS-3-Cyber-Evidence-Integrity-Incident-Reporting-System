{% extends "base.html" %}

{% block content %}
<div class="page-section active" style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
    <div class="chain-viz" style="max-width:480px; width:100%; padding:2.5rem; margin:2rem auto; background:var(--bg-card); backdrop-filter:blur(16px); border-radius:var(--radius-xl); border:1px solid rgba(42,107,111,0.06); box-shadow:var(--shadow-heavy);">
        <div style="text-align:center; margin-bottom:1.8rem;">
            <div class="icon-wrap" style="margin:0 auto 1rem; width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg, rgba(42,107,111,0.15), rgba(201,168,94,0.08)); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--accent-gold);">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2 style="font-weight:800; font-size:1.8rem; letter-spacing:-0.02em;">
                <span class="highlight" style="background:linear-gradient(135deg, var(--accent-teal-light), var(--accent-gold)); -webkit-background-clip:text; background-clip:text; color:transparent;">Apply as Officer</span>
            </h2>
            <p style="color:var(--text-secondary); font-size:0.95rem; margin-top:0.2rem;">Your application requires admin approval</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register_officer') }}" style="display:flex; flex-direction:column; gap:1.2rem;">
            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-user search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="text" name="username" placeholder="Username" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>
            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-id-card search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="text" name="name" placeholder="Full Name" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>
            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-envelope search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="email" name="email" placeholder="Email (optional)" style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>
            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-key search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="password" name="password" placeholder="Password" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>
            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-bolt search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="text" name="specialization" placeholder="Specialization (e.g., Cyber Fraud, Hacking)" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:0.9rem; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:0.6rem; background:linear-gradient(135deg, var(--accent-teal), #1a4f52); color:#fff; border:none; border-radius:3rem; cursor:pointer;">
                <i class="fas fa-paper-plane"></i> Submit Application
            </button>
        </form>

        <div style="margin-top:1.8rem; text-align:center; font-size:0.9rem; color:var(--text-secondary); border-top:1px solid rgba(42,107,111,0.06); padding-top:1.5rem;">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--accent-teal-light); text-decoration:none; font-weight:500;">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
