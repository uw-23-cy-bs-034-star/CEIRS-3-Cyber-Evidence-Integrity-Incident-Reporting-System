{% extends "base.html" %}

{% block content %}
<div class="page-section active" style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
    <div class="chain-viz" style="max-width:440px; width:100%; padding:2.5rem; margin:2rem auto; background:var(--bg-card); backdrop-filter:blur(16px); border-radius:var(--radius-xl); border:1px solid rgba(42,107,111,0.06); box-shadow:var(--shadow-heavy);">
        <div style="text-align:center; margin-bottom:1.8rem;">
            <div class="icon-wrap" style="margin:0 auto 1rem; width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg, rgba(42,107,111,0.15), rgba(201,168,94,0.08)); display:flex; align-items:center; justify-content:center; font-size:2rem; color:var(--accent-teal-light);">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="font-weight:800; font-size:1.8rem; letter-spacing:-0.02em;">
                <span class="highlight" style="background:linear-gradient(135deg, var(--accent-teal-light), var(--accent-gold)); -webkit-background-clip:text; background-clip:text; color:transparent;">Welcome Back</span>
            </h2>
            <p style="color:var(--text-secondary); font-size:0.95rem; margin-top:0.2rem;">Sign in to your CEIRS account</p>
        </div>

        <!-- ✅ Uses url_for to generate correct action -->
        <form method="POST" action="{{ url_for('auth.login') }}" style="display:flex; flex-direction:column; gap:1.2rem;">
            <div style="position:relative;">
                <i class="fas fa-user-tag" style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.9rem; z-index:1;"></i>
                <select name="role" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit; appearance:none;">
                    <option value="USER">Login as User</option>
                    <option value="OFFICER">Login as Officer</option>
                    <option value="ADMIN">Login as Admin</option>
                </select>
            </div>

            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-user search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="text" name="username" placeholder="Username" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>

            <div class="search-wrap" style="width:100%;">
                <i class="fas fa-key search-icon" style="left:1rem; color:var(--text-muted);"></i>
                <input type="password" name="password" placeholder="Password" required style="width:100%; padding:0.8rem 1rem 0.8rem 3rem; background:var(--bg-card); border:1px solid rgba(42,107,111,0.08); border-radius:3rem; color:var(--text-primary); font-size:0.95rem; outline:none; font-family:inherit;">
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; padding:0.9rem; font-size:1rem; display:flex; align-items:center; justify-content:center; gap:0.6rem; background:linear-gradient(135deg, var(--accent-teal), #1a4f52); color:#fff; border:none; border-radius:3rem; cursor:pointer;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div style="margin-top:1.8rem; text-align:center; font-size:0.9rem; color:var(--text-secondary); border-top:1px solid rgba(42,107,111,0.06); padding-top:1.5rem;">
            <p>New User? <a href="{{ url_for('auth.register') }}" style="color:var(--accent-teal-light); text-decoration:none; font-weight:500;">Register as User</a></p>
            <p>Apply to become Officer: <a href="{{ url_for('auth.register_officer') }}" style="color:var(--accent-gold); text-decoration:none; font-weight:500;">Register as Officer</a></p>
        </div>
    </div>
</div>
{% endblock %}
